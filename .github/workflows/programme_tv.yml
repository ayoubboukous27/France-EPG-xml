name: EPG Programme TV Update

on:
  schedule:
    - cron: "0 3 * * *"  # يوميًا الساعة 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  epg_programme_tv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clone EPG repo
        run: |
          if [ ! -d "epg" ]; then
            git clone --depth 1 https://github.com/iptv-org/epg.git
          else
            git -C epg pull
          fi
          cd epg
          npm install

      - name: Generate EPG (programme-tv.net)
        run: |
          cd epg
          npx tsx scripts/commands/epg/grab.ts \
            --channels=sites/programme-tv.net/programme-tv.net.channels.xml \
            --output=guide.xml \
            --days=7

      - name: Save XML
        run: |
          mkdir -p public
          cp epg/guide.xml public/epg-programme-tv.xml

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/epg-programme-tv.xml
          git diff-index --quiet HEAD || git commit -m "Update EPG programme-tv"
          git pull --rebase origin main
          git push origin main
