name: Grab Orange France

on:
  schedule:
    - cron: "0 6 * * *"  # تحديث يوميًا الساعة 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  grab_orange_fr:
    runs-on: ubuntu-latest

    steps:
      # --------------------------
      # Checkout repository
      # --------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------
      # Setup Node.js
      # --------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # --------------------------
      # Clone iptv-org/epg
      # --------------------------
      - name: Clone iptv-org/epg
        run: |
          if [ ! -d "epg" ]; then
            git clone --depth 1 https://github.com/iptv-org/epg.git
          else
            git -C epg pull
          fi

      # --------------------------
      # Install dependencies
      # --------------------------
      - name: Install dependencies
        run: |
          cd epg
          npm install

      # --------------------------
      # Grab EPG for Orange FR
      # --------------------------
      - name: Grab Orange FR EPG
        run: |
          cd epg
          npx tsx scripts/commands/epg/grab.ts \
            --channels=sites/chaines-tv.orange.fr/chaines-tv.orange.fr.channels.xml \
            --output=guide_orange_fr.xml \
            --days=7

      # --------------------------
      # Parse channels (to ensure correct XML)
      # --------------------------
      - name: Parse channels XML
        run: |
          cd epg
          npx tsx scripts/commands/epg/channels.ts \
            --config=sites/chaines-tv.orange.fr/chaines-tv.orange.fr.config.js \
            --output=sites/chaines-tv.orange.fr/chaines-tv.orange.fr.channels.xml \
            --set=country:fr

      # --------------------------
      # Save XML output
      # --------------------------
      - name: Save XML
        run: |
          mkdir -p public
          cp epg/guide_orange_fr.xml public/epg-orange-fr.xml

      # --------------------------
      # Commit & Push
      # --------------------------
      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/epg-orange-fr.xml
          git diff-index --quiet HEAD || git commit -m "Update Orange FR EPG"
          git pull --rebase origin main
          git push origin main
