name: Update beIN EPG

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  update-bein:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout this repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🟢 Setup Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: 📂 Clone iptv-org/epg
        run: |
          git clone --depth 1 https://github.com/iptv-org/epg.git epg

      - name: 📦 Install dependencies
        run: |
          cd epg
          npm install

      - name: ▶️ Run grab for bein.com (7 days)
        run: |
          cd epg
          npm run grab -- --site=bein.com --lang=en --days=7

      - name: 📂 Copy guide.xml to /public
        run: |
          mkdir -p public
          # الملف الرئيسي الذي يحتوي على البرامج هو guide.xml
          cp epg/guide.xml public/bein_epg.xml

      - name: 💾 Commit & Push XML safely
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add public/bein_epg.xml

          if ! git diff --cached --quiet; then
            git commit -m "Update beIN EPG guide (7 days)"
          fi

          git pull --rebase origin main
          git push origin main
