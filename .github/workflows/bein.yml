name: Update beIN EPG

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  update-bein:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout this repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # مهم لجلب كل التاريخ لتجنب مشاكل rebase

      - name: 🟢 Setup Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: 📂 Clone iptv-org/epg
        run: |
          git clone --depth 1 https://github.com/iptv-org/epg.git epg

      - name: 📦 Install dependencies
        run: |
          cd epg
          npm install

      - name: ▶️ Run grab for bein.com
        run: |
          cd epg
          npm run grab -- --site=bein.com --lang=en

      - name: ▶️ Parse channels for bein.com
        run: |
          cd epg
          npm run channels:parse -- \
            --config=./sites/bein.com/bein.com.config.js \
            --output=./sites/bein.com/bein.com_en.channels.xml \
            --set=lang:en

      - name: 📂 Copy XML to /public
        run: |
          mkdir -p public
          cp epg/sites/bein.com/bein.com_en.channels.xml public/bein.com_en.channels.xml

      - name: 💾 Commit & Push XML safely
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          # إضافة الملف
          git add public/bein.com_en.channels.xml

          # عمل commit فقط إذا هناك تغييرات
          if ! git diff --cached --quiet; then
            git commit -m "Update beIN EPG XML in /public"
          fi

          # جلب أحدث التغييرات من remote وإعادة تطبيق commits المحلية فوقها
          git pull --rebase origin master

          # الآن push آمن
          git push origin master
