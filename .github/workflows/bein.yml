name: Grab beIN Mena Package AR EPG

on:
  schedule:
    - cron: "0 5 * * *"  # تحديث يوميًا الساعة 05:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  grab_bein_ar:
    runs-on: ubuntu-latest

    steps:
      # --------------------------
      # Checkout the repository
      # --------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------
      # Setup Node.js (latest stable)
      # --------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "node"

      # --------------------------
      # Clone iptv-org/epg repository
      # --------------------------
      - name: Clone iptv-org/epg
        run: |
          if [ ! -d "epg" ]; then
            git clone --depth 1 https://github.com/iptv-org/epg.git
          else
            git -C epg pull
          fi

      # --------------------------
      # Install dependencies
      # --------------------------
      - name: Install dependencies
        run: |
          cd epg
          npm install

      # --------------------------
      # Grab beIN Sports Arabic EPG
      # --------------------------
      - name: Grab beIN Sports AR EPG
        run: |
          cd epg
          npm run grab --- --site=bein.com --lang=ar
          npm run channels:parse --- --config=./sites/bein.com/bein.com.config.js --output=./sites/bein.com/bein.com_ar.channels.xml --set=lang:ar

      # --------------------------
      # Save XML output
      # --------------------------
      - name: Save XML
        run: |
          mkdir -p public
          cp epg/sites/bein.com/bein.com_ar.channels.xml public/epg-bein-ar.xml
          echo "✅ EPG saved to public/epg-bein-ar.xml"

      # --------------------------
      # Commit & Push
      # --------------------------
      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/epg-bein-ar.xml
          git diff-index --quiet HEAD || git commit -m "Update beIN Sports AR EPG"
          git pull --rebase origin main
          git push origin main
