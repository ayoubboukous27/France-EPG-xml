name: Fetch EPG Daily

on:
  schedule:
    - cron: '0 3 * * *'  # كل يوم الساعة 03:00 UTC
  workflow_dispatch:     # تشغيل يدوي إذا أردت

jobs:
  fetch-epg:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run EPG Script
        run: node scripts/fetch-epg.js

      - name: Commit & Push EPG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add epg/*.xml
          git commit -m "Update EPG for $(date +'%Y-%m-%d')" || echo "No changes"
          git push
