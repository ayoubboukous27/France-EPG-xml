name: Ce Soir France

on:
  schedule:
    - cron: "0 6 * * *"    # تحديث يوميًا الساعة 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  epg_tvcesoir:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clone iptv-org/epg
        run: |
          if [ ! -d "epg" ]; then
            git clone --depth 1 https://github.com/iptv-org/epg.git
          else
            git -C epg pull
          fi

      - name: Install dependencies
        run: |
          cd epg
          npm install
          npm install xml2js

      # --------------------------
      # Grab TV CEssoir EPG using channels file
      # --------------------------
      - name: Grab TV CEssoir EPG (7 days)
        run: |
          cd epg
          npx tsx scripts/commands/epg/grab.ts \
            --channels=sites/tvcesoir.fr/tvcesoir.fr.channels.xml \
            --output=guide_tvcesoir.xml \
            --days=7

      - name: Save EPG XML
        run: |
          mkdir -p public
          cp epg/guide_tvcesoir.xml public/epg-tvcesoir.xml

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/epg-tvcesoir.xml
          git diff-index --quiet HEAD || git commit -m "Update 7-day EPG tvcesoir.fr"
          git pull --rebase origin main
          git push origin main
