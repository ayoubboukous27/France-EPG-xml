name: Movistar EPG + Spain Logos

on:
  schedule:
    - cron: "0 6 * * *"   # تحديث يوميًا الساعة 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  epg_movistar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------
      # Download XML 7 days
      # --------------------------
      - name: Download Movistar XML
        run: |
          mkdir -p epg
          curl -L "https://github.com/ayoubboukous27/Multi-providers-EPG-/raw/refs/heads/main/public/epg-movistarplus-es-7days.xml" -o epg/guide.xml

      # --------------------------
      # Clone tv-logos Spain
      # --------------------------
      - name: Clone TV Logos Spain
        run: |
          git clone https://github.com/tv-logo/tv-logos.git

      # --------------------------
      # Add logos with normalization
      # --------------------------
      - name: Add logos to Movistar XML
        run: |
          node << 'EOF'
          const fs = require('fs');
          const path = require('path');

          let xml = fs.readFileSync('epg/guide.xml', 'utf8');

          const logosDir = path.join(__dirname, 'tv-logos', 'countries', 'spain');
          const files = fs.readdirSync(logosDir);

          // دالة normalize للأسماء (XML + filenames)
          function normalize(name) {
            return name
              .toLowerCase()
              .normalize('NFD')                 // فصل علامات التشكيل
              .replace(/[\u0300-\u036f]/g, '') // إزالة التشكيل
              .replace(/\s+/g, '-')             // استبدال الفراغات بـ -
              .replace(/\+/g, '')               // إزالة + إذا موجودة
              .replace(/[^a-z0-9-]/g, '');     // إزالة أي رموز غير الحروف والأرقام -
          }

          // بناء mapping: normalized channel name → URL الشعار
          const logos = {};
          files.forEach(file => {
            const name = path.basename(file, path.extname(file)); // بدون امتداد
            logos[normalize(name)] = `https://raw.githubusercontent.com/tv-logo/tv-logos/main/countries/spain/${file}`;
          });

          // تعديل XML
          xml = xml.replace(/(<channel[^>]*>)([\s\S]*?)(<\/channel>)/gi, (match, start, middle, end) => {
            const nameMatch = middle.match(/<display-name>([^<]+)<\/display-name>/i);
            if (!nameMatch) return match;

            const channelName = normalize(nameMatch[1]);
            let logoUrl = null;

            for (const key in logos) {
              if (channelName.includes(key)) {
                logoUrl = logos[key];
                break;
              }
            }

            if (logoUrl) {
              const cleaned = middle.replace(/<icon[^>]*\/>/gi, '');
              return `${start}<icon src="${logoUrl}"/>${cleaned}${end}`;
            }

            return match;
          });

          fs.writeFileSync('epg/guide.xml', xml);
          console.log('✅ Logos added with normalization');
          EOF

      # --------------------------
      # Save XML
      # --------------------------
      - name: Save XML
        run: |
          mkdir -p public
          cp epg/guide.xml public/epg-movistar-with-logos.xml

      # --------------------------
      # Commit & Push
      # --------------------------
      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/epg-movistar-with-logos.xml
          git diff-index --quiet HEAD || git commit -m "Update Movistar EPG with Spain logos"
          git pull --rebase origin main
          git push origin main
