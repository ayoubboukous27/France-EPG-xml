name: EPG TV Blue Update

on:
  schedule:
    - cron: "0 4 * * *"  # تحديث يوميًا الساعة 04:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  epg_tv_blue:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clone EPG repo
        run: |
          git clone --depth 1 https://github.com/iptv-org/epg.git
          cd epg
          npm install

      - name: Generate EPG (tv.blue.ch)
        run: |
          cd epg
          npm run grab --- --site=tv.blue.ch --days=7

      # --------------------------
      # Add Blue Sports logo
      # --------------------------
      - name: Add Blue Sports logo
        run: |
          node << 'EOF'
          const fs = require('fs');
          let xml = fs.readFileSync('epg/guide.xml', 'utf8');

          // رابط شعار Blue Sports
          const blueLogo = "https://raw.githubusercontent.com/ayoubboukous27/Event/refs/heads/main/Logos/blue-sports.png";

          // ابحث عن كل قناة تحتوي اسمها على "blue sport" وأضف أو استبدل شعارها
          xml = xml.replace(/(<channel[^>]*>)([\s\S]*?)(<\/channel>)/gi, (match, start, middle, end) => {
            if (/blue sport/i.test(middle)) {
              // إزالة أي شعار موجود مسبقًا
              const cleaned = middle.replace(/<icon[^>]*\/>/gi, '');
              return `${start}<icon src="${blueLogo}"/>${cleaned}${end}`;
            }
            return match;
          });

          fs.writeFileSync('epg/guide.xml', xml);
          console.log('✅ Blue Sports logo applied to matching channels');
          EOF

      - name: Save XML
        run: |
          mkdir -p public
          cp epg/guide.xml public/epg-tv-blue.xml

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/epg-tv-blue.xml
          git diff-index --quiet HEAD || git commit -m "Update EPG tv.blue.ch with Blue Sports logo"
          git pull --rebase origin main
          git push origin main
