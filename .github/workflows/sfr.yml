name: SFR France

on:
  workflow_dispatch:       # تشغيل يدوي
  schedule:
    - cron: "0 4 * * *"   # تحديث يوميًا الساعة 04:00 UTC

permissions:
  contents: write

jobs:
  epg_tv_sfr_7days:
    runs-on: ubuntu-latest

    steps:
      # --------------------------
      # Checkout repo
      # --------------------------
      - name: Checkout repo
        uses: actions/checkout@v4

      # --------------------------
      # Setup Node.js
      # --------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # --------------------------
      # Clone iptv-org/epg
      # --------------------------
      - name: Clone EPG repo
        run: |
          if [ ! -d "epg" ]; then
            git clone --depth 1 https://github.com/iptv-org/epg.git
          else
            git -C epg pull
          fi

      # --------------------------
      # Install dependencies
      # --------------------------
      - name: Install dependencies
        run: |
          cd epg
          npm install

      # --------------------------
      # Grab 7-day EPG
      # --------------------------
      - name: Generate 7-day EPG (tv.sfr.fr)
        run: |
          cd epg
          npx tsx scripts/commands/epg/grab.ts \
            --site=tv.sfr.fr \
            --output=guide.xml \
            --days=7

      # --------------------------
      # Save XML
      # --------------------------
      - name: Save XML
        run: |
          mkdir -p public
          cp epg/guide.xml public/epg-tv-sfr-7days.xml

      # --------------------------
      # Commit & Push
      # --------------------------
      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/epg-tv-sfr-7days.xml
          git diff-index --quiet HEAD || git commit -m "Update 7-day EPG tv.sfr.fr"
          git pull --rebase origin main
          git push origin main
